spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/payment_db
    username: postgres
    password: root9999

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: false

  jackson:
    serialization:
      indent-output: true

  logging:
    level:
      org.hibernate.SQL: OFF
      org.hibernate.orm.jdbc.bind: OFF
      org.hibernate.tool.schema: OFF

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000

server:
  port: 8080

payment:
  routing:
    CARD: PROVIDER_A
    UPI: PROVIDER_B
  failover:
    PROVIDER_A: PROVIDER_B
    PROVIDER_B: PROVIDER_A
  paymentTypes: [CARD, UPI]
  providerTypes: [PROVIDER_A, PROVIDER_B, PROVIDER_C]
  simulation:
    provider-a-failure-enabled: true
  retry:
    max-attempts: 2
